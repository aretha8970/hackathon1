<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../static/css/style.css">
  <title>Tree Detector</title>
</head>
<body>
  <header class="header">
    <img src="../static/img/logo.svg" alt="logo" width="50" height="50">
    <ul class="main-list">
        <li class="list__item">
          <a href="">Halaman utama</a>
        </li>
        <li class="list__item">
          <a href="">Koleksi</a>
        </li>
        <li class="list__item">
          <a href="">Umpan balik</a>
        </li>
    </ul>
  </header>
  <main>
    {% block content %}
    <div class="form-block">
      <h1>Buat meme kamu!</h1>
      <form method="POST" action="{{ url_for('index') }}">
        <label for="image">Upload Gambar:</label>
        <input type="file" id="image" name="image" accept="image/*" required>
        <button type="submit">Pembuat meme</button>
      </form>
    </div>
    <div class="meme-block" id="memeBlock">
      <img class="meme" src="{{ url_for('serve_images', path=selected_image) }}" alt="{{ selected_image }}">
    </div>
    {% endblock %}
  </main>
  <footer>

  </footer>
</body>
</html>
